{% extends "base.html" %}
{% block content %}

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<style>
body{
    background:
        radial-gradient(circle at top left, rgba(79,70,229,0.18), transparent 30%),
        radial-gradient(circle at bottom right, rgba(212,175,55,0.08), transparent 30%),
        linear-gradient(135deg,#301934,#3B1F47,#26122B);
    min-height:100vh;
    color:#fff;
}

.main-box{
    max-width:900px;
    margin:auto;
    padding:40px 16px 60px;
}

.back{
    margin-bottom:15px;
    display:inline-flex;
    align-items:center;
    gap:8px;
    color:#fff;
    text-decoration:none;
    font-weight:600;
}

.back:hover{
    color:#D4AF37;
}

.big-card{
    background: linear-gradient(135deg,#3E2450,#2a1536);
    border:1px solid #6d3c7c;
    border-radius:24px;
    padding:28px;
    box-shadow:0 20px 50px rgba(0,0,0,0.4);
}

.main-title{
    font-size:30px;
    font-weight:900;
    margin-bottom:8px;
    color:#fff;
}

.main-title span{
    color:#D4AF37;
}

.sub-text{
    font-size:14px;
    color:#cfc3db;
    margin-bottom:22px;
    line-height:1.7;
}

.label{
    font-size:13px;
    font-weight:800;
    color:#D4AF37;
    margin-bottom:8px;
    display:block;
}

textarea{
    width:100%;
    min-height:150px;
    border-radius:16px;
    padding:14px 16px;
    border:1px solid rgba(255,255,255,0.10);
    background:rgba(255,255,255,0.05);
    color:#fff;
    outline:none;
    resize:none;
    font-size:14px;
    line-height:1.7;
}

textarea::placeholder{
    color:#cfc3db;
}

textarea:focus{
    border-color:#D4AF37;
    box-shadow:0 0 0 3px rgba(212,175,55,0.12);
}

.btn-gold{
    margin-top:14px;
    background:#D4AF37;
    color:#26122B;
    border:none;
    padding:11px 20px;
    border-radius:12px;
    font-weight:800;
    display:inline-flex;
    align-items:center;
    gap:8px;
}

.btn-gold:hover{
    background:#e6c65c;
}

.error-box{
    margin-top:14px;
    background:rgba(255,0,0,0.10);
    border:1px solid rgba(255,0,0,0.20);
    color:#ffd5d5;
    padding:12px 14px;
    border-radius:12px;
}

@media(max-width:768px){
    .main-box{
        padding:24px 12px 50px;
    }

    .big-card{
        padding:22px 18px;
        border-radius:20px;
    }

    .main-title{
        font-size:24px;
    }
}
</style>

<div class="main-box">

    <a href="{{ url_for('public_page') }}" class="back">
        <i class="bi bi-arrow-left"></i> Back to public module
    </a>

    <div class="big-card">
        <div class="main-title">FIR Info <span>Guide</span></div>
        <div class="sub-text">
            Ask any FIR-related doubt and get a simple explanation, filing steps, required details, and rights.
        </div>

        <form method="POST" action="{{ url_for('fir_guide') }}">
            <label class="label">Your FIR Question</label>
            <textarea name="query" placeholder="Example: How to file FIR?"></textarea>
            <button type="submit" class="btn-gold">
                <i class="bi bi-search"></i> Check FIR Guide
            </button>
        </form>

        {% if error %}
        <div class="error-box">{{ error }}</div>
        {% endif %}
    </div>
</div>

{% endblock %}
