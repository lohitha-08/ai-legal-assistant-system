{% extends "base.html" %}
{% block content %}

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<style>
body{
    background:
        radial-gradient(circle at top left, rgba(79,70,229,0.16), transparent 24%),
        radial-gradient(circle at bottom right, rgba(212,175,55,0.10), transparent 22%),
        linear-gradient(135deg,#160f1f 0%, #22122d 45%, #120b18 100%);
    min-height:100vh;
    color:#fff;
}

.guide-container{
    max-width:950px;
    margin:auto;
    padding:34px 16px 60px;
}

.guide-card{
    background:
        radial-gradient(circle at top left, rgba(79,70,229,0.16), transparent 35%),
        radial-gradient(circle at bottom right, rgba(212,175,55,0.08), transparent 35%),
        linear-gradient(135deg,#301934,#3B1F47,#26122B);
    border:1px solid #5A3A6B;
    border-radius:24px;
    padding:30px 28px;
    box-shadow:0 18px 40px rgba(0,0,0,0.34);
    color:#fff;
}

.back-link{
    display:inline-flex;
    align-items:center;
    gap:8px;
    text-decoration:none;
    color:#e7dbf3;
    font-size:14px;
    font-weight:600;
    margin-bottom:16px;
}

.back-link:hover{
    color:#D4AF37;
}

.guide-title{
    font-size:30px;
    font-weight:800;
    margin-bottom:8px;
    color:#fff;
}

.guide-title span{
    color:#D4AF37;
}

.guide-sub{
    color:#CFC3DA;
    font-size:14px;
    line-height:1.7;
    margin-bottom:22px;
}

.form-label{
    font-size:14px;
    font-weight:700;
    color:#F3ECF9;
    margin-bottom:10px;
    display:block;
}

.guide-textarea{
    width:100%;
    border-radius:16px;
    padding:16px 18px;
    border:1px solid #5A3A6B;
    background:rgba(255,255,255,0.05);
    color:#fff;
    outline:none;
    resize:none;
    font-size:14px;
    line-height:1.7;
    min-height:150px;
}

.guide-textarea::placeholder{
    color:#B8AFC6;
}

.guide-textarea:focus{
    border-color:#D4AF37;
    box-shadow:0 0 0 3px rgba(212,175,55,0.12);
}

.guide-btn{
    margin-top:18px;
    background:linear-gradient(135deg,#D4AF37,#B8860B);
    color:#1d1022;
    border:none;
    padding:12px 24px;
    border-radius:14px;
    font-weight:800;
    font-size:14px;
    display:inline-flex;
    align-items:center;
    gap:8px;
}

.guide-btn:hover{
    transform:translateY(-2px);
}

.error-box{
    margin-top:18px;
    padding:13px 15px;
    border-radius:14px;
    background:rgba(220,38,38,0.12);
    border:1px solid rgba(220,38,38,0.35);
    color:#fecaca;
    font-size:14px;
}

@media (max-width:768px){
    .guide-container{
        padding:24px 12px 50px;
    }

    .guide-card{
        padding:22px 18px;
    }

    .guide-title{
        font-size:24px;
    }
}
</style>

<div class="guide-container">

    <a href="{{ url_for('public_page') }}" class="back-link">
        <i class="bi bi-arrow-left"></i> Back to Public Module
    </a>

    <div class="guide-card">
        <h2 class="guide-title">Step-by-Step <span>Guide</span></h2>
        <p class="guide-sub">
            Enter your situation and get simple step-by-step legal guidance on what to do next.
        </p>

        <form method="POST" action="{{ url_for('procedure_guide') }}">
            <label class="form-label">Describe Your Situation</label>
            <textarea
                name="situation"
                rows="5"
                class="guide-textarea"
                placeholder="Example: My bike was stolen near my college. What should I do first?"
            ></textarea>

            <button type="submit" class="guide-btn">
                <i class="bi bi-list-check"></i> Get Guide
            </button>
        </form>

        {% if error %}
        <div class="error-box">
            {{ error }}
        </div>
        {% endif %}
    </div>
</div>

{% endblock %}
