<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI LEGAL ASSISTANT</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <style>
        body{
            margin:0;
            min-height:100vh;
            background:
                radial-gradient(circle at top left, rgba(79,70,229,0.14), transparent 28%),
                radial-gradient(circle at bottom right, rgba(212,175,55,0.08), transparent 24%),
                linear-gradient(135deg, #301934, #3B1F47, #26122B);
            color:#FFFFFF;
            font-family:"Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        }

        .main-navbar{
            background:rgba(30, 15, 36, 0.96);
            border-bottom:1px solid #5A3A6B;
            box-shadow:0 8px 24px rgba(0,0,0,0.20);
            backdrop-filter:blur(8px);
        }

        .navbar-brand{
            color:#FFFFFF !important;
            font-size:20px;
            font-weight:700;
            letter-spacing:0.3px;
        }

        .brand-logo{
            width:34px;
            height:34px;
            object-fit:contain;
            border-radius:8px;
        }

        .user-badge{
            color:#E5E4E2;
            font-size:13px;
            padding:8px 12px;
            border-radius:12px;
            background:rgba(255,255,255,0.04);
            border:1px solid rgba(90,58,107,0.75);
        }

        .nav-icon-btn{
            width:40px;
            height:40px;
            display:inline-flex;
            align-items:center;
            justify-content:center;
            border-radius:12px;
            text-decoration:none;
            color:#FFFFFF;
            border:1px solid #5A3A6B;
            background:#3E2450;
            transition:0.28s ease;
            box-shadow:0 6px 14px rgba(0,0,0,0.18);
        }

        .nav-icon-btn:hover{
            background:#4A2B60;
            color:#D4AF37;
            transform:translateY(-2px);
        }

        .page-shell{
            padding:28px 18px 40px;
        }

        @media (max-width: 768px){
            .page-shell{
                padding:22px 10px 34px;
            }

            .navbar-brand{
                font-size:17px;
            }

            .user-badge{
                display:none;
            }
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg px-3 px-md-4 main-navbar">
    <div class="container-fluid">

        <a class="navbar-brand d-flex align-items-center" href="{{ url_for('home_page') }}">
            <img src="{{ url_for('static', filename='images/AI_LEGAL_ASSISTANT_logo.png') }}"
                 class="me-2 brand-logo"
                 alt="Logo">
            AI Legal Assistant
        </a>

        <div class="d-flex align-items-center gap-2">
            {% if session.get("username") %}
                <span class="user-badge">
                    {{ session.get("role", "User") }} • {{ session.get("username") }}
                </span>

                <a href="{{ url_for('logout') }}" class="nav-icon-btn" title="Logout">
                    <i class="bi bi-box-arrow-right"></i>
                </a>
            {% endif %}
        </div>

    </div>
</nav>

<div class="container-fluid page-shell">
    {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
