{% extends "base.html" %}
{% block content %}

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<style>
body{
    background:
        radial-gradient(circle at 15% 20%, rgba(124,58,237,0.20), transparent 25%),
        radial-gradient(circle at 85% 25%, rgba(212,175,55,0.12), transparent 25%),
        linear-gradient(135deg,#1a0d25 0%, #301934 40%, #3B1F47 100%);
    color:#fff;
    min-height:100vh;
}

.box{
    max-width:820px;
    margin:auto;
    padding:40px 16px 60px;
}

.card{
    background:
        radial-gradient(circle at top left, rgba(79,70,229,0.15), transparent 35%),
        radial-gradient(circle at bottom right, rgba(212,175,55,0.08), transparent 35%),
        linear-gradient(135deg,#3E2450,#2b1837);
    padding:28px;
    border-radius:22px;
    border:1px solid rgba(255,255,255,0.06);
    box-shadow:0 16px 36px rgba(0,0,0,0.3);
}

.header{
    margin-bottom:18px;
}

.header h2{
    color:#eeece6;
    font-size:28px;
    font-weight:900;
    margin-bottom:6px;
}

.header span{
    color:#D4AF37;
}

.sub{
    font-size:14px;
    color:#cfc3db;
}

.section{
    background:rgba(255,255,255,0.04);
    border:1px solid rgba(255,255,255,0.08);
    padding:16px;
    border-radius:16px;
    margin-bottom:14px;
}

.title{
    color:#D4AF37;
    font-weight:800;
    font-size:13px;
    margin-bottom:8px;
    text-transform:uppercase;
    letter-spacing:0.5px;
}

.text{
    font-size:14px;
    line-height:1.8;
    color:#f4ecfa;
}

.action{
    margin-top:16px;
}

.btn-gold{
    background:#D4AF37;
    color:#26122B;
    border:none;
    padding:10px 18px;
    border-radius:12px;
    font-weight:800;
    text-decoration:none;
    display:inline-flex;
    align-items:center;
    gap:6px;
    transition:0.2s ease;
}

.btn-gold:hover{
    background:#e6c65c;
    transform:translateY(-2px);
}

.back{
    display:inline-flex;
    align-items:center;
    gap:6px;
    margin-bottom:16px;
    text-decoration:none;
    color:#fff;
    font-weight:700;
}

.back:hover{
    color:#D4AF37;
}

@media(max-width:768px){
    .box{
        padding:24px 12px 50px;
    }

    .card{
        padding:20px;
    }

    .header h2{
        font-size:22px;
    }
}
</style>

<div class="box">

    <a href="{{ url_for('legal_faq') }}" class="back">
        <i class="bi bi-arrow-left"></i> Back to legal faq
    </a>

    <div class="card">

        <div class="header">
            <h2>FAQ <span>Result</span></h2>
            <div class="sub">Here is a simple answer based on your question.</div>
        </div>

        <div class="section">
            <div class="title">Your Question</div>
            <div class="text">{{ user_query }}</div>
        </div>

        <div class="section">
            <div class="title">Answer</div>
            <div class="text">{{ result.answer }}</div>
        </div>

        <div class="action">
            <a href="{{ url_for('legal_faq') }}" class="btn-gold">
                <i class="bi bi-arrow-repeat"></i> Ask Another Question
            </a>
        </div>

    </div>
</div>

{% endblock %}
