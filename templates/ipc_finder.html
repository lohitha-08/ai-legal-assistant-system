{% extends "base.html" %}
{% block content %}

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<style>
body{
    background:
        radial-gradient(circle at top left, rgba(79,70,229,0.18), transparent 30%),
        radial-gradient(circle at bottom right, rgba(212,175,55,0.08), transparent 30%),
        linear-gradient(135deg,#301934,#3B1F47,#26122B);
    color:#fff;
    min-height:100vh;
}

.box{
    max-width:820px;
    margin:auto;
    padding:40px 16px 60px;
}
.back-link{
    display:inline-flex;
    align-items:center;
    gap:8px;
    text-decoration:none;
    color:#eee4f7;
    font-size:14px;
    font-weight:700;
    margin-bottom:18px;
    transition:0.25s ease;
}

.back-link:hover{
    color:#D4AF37;
    transform:translateX(-2px);
}

.card{
    background:
        radial-gradient(circle at top left, rgba(79,70,229,0.15), transparent 35%),
        radial-gradient(circle at bottom right, rgba(212,175,55,0.08), transparent 35%),
        linear-gradient(135deg,#3E2450,#2b1837);
    padding:28px;
    border-radius:22px;
    border:1px solid rgba(255,255,255,0.06);
    box-shadow:0 16px 36px rgba(0,0,0,0.3);
}

.header h2{
    color:#ffffff;
    font-size:28px;
    font-weight:900;
    margin-bottom:6px;
}

.header span{
    color:#D4AF37;
}

.sub{
    font-size:14px;
    color:#cfc3db;
    margin-bottom:18px;
}

textarea{
    width:100%;
    min-height:130px;
    border-radius:14px;
    padding:14px;
    border:1px solid rgba(255,255,255,0.10);
    background:rgba(255,255,255,0.05);
    color:#fff;
    outline:none;
    resize:none;
    font-size:14px;
    line-height:1.7;
}

textarea::placeholder{
    color:#cfc3db;
}

textarea:focus{
    border-color:#D4AF37;
    box-shadow:0 0 0 3px rgba(212,175,55,0.15);
}

button{
    margin-top:14px;
    padding:14px 22px;
    background:#D4AF37;
    border:none;
    border-radius:14px;
    font-weight:800;
    font-size:15px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    transition:0.25s ease;
    width:100%;
    cursor:pointer;
}

button:hover{
    background:#e6c65c;
    transform:translateY(-2px);
}

.error{
    margin-top:14px;
    color:#ffb4b4;
}

@media(max-width:768px){
    .box{
        padding:24px 12px 50px;
    }

    .card{
        padding:20px;
    }

    .header h2{
        font-size:22px;
    }
}
</style>

<div class="box">

    <a href="{{ url_for('public_page') }}" class="back-link">
        <i class="bi bi-arrow-left"></i> Back to Public Module
    </a>
    <div class="card">

        <div class="header">
            <h2>Section <span>Finder</span></h2>
            <div class="sub">Describe the issue and get a likely IPC / BNS section with simple explanation.</div>
        </div>

        <form method="POST" action="{{ url_for('ipc_finder') }}">
            <textarea name="query" placeholder="Example: Someone cheated me in an online payment."></textarea>

            <button type="submit">
                <i class="bi bi-search"></i> Find Section
            </button>
        </form>

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

    </div>
</div>

{% endblock %}
